<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年啦！五週年紀念</title>
    <style>
        :root {
            --bg-color: #FFF9F2;   /* 柔和奶油色背景 */
            --accent-color: #f38d8d; /* 柔和珊瑚粉 */
            --border-color: #7d6e6e; /* 柔和的深咖啡邊框 */
            --text-color: #5d5d5d;
        }

        body { 
            background-color: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            margin: 0; 
            padding: 40px 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        h1 {
            color: var(--accent-color);
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #fff;
        }

        #gacha-machine {
            width: 340px;
            background: white;
            padding: 25px;
            border-radius: 40px;
            border: 4px solid var(--border-color);
            box-shadow: 0 10px 0px #e0d5c5;
            text-align: center;
        }

        #display-window {
            height: 160px;
            background: #fff;
            border: 3px solid var(--border-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 85px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
        }

        #message-display {
            min-height: 110px;
            background: #fff;
            color: var(--text-color);
            padding: 15px;
            border-radius: 15px;
            font-size: 26px; /* 依然維持超大字體 */
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            margin-bottom: 20px;
            border: 2px dashed var(--accent-color);
        }

        #lever {
            width: 100%;
            padding: 18px 0;
            background: var(--accent-color);
            border: none;
            border-bottom: 5px solid #d67a7a;
            border-radius: 15px;
            cursor: pointer;
            color: white;
            font-size: 24px;
            font-weight: bold;
            transition: 0.1s;
        }

        #lever:active {
            transform: translateY(4px);
            border-bottom: 1px solid #d67a7a;
        }

        /* 統計欄位設計 */
        #stats-panel {
            margin-top: 30px;
            width: 340px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #e0d5c5;
        }

        #stats-panel h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: var(--text-color);
            border-bottom: 1px solid #e0d5c5;
            padding-bottom: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            font-size: 14px;
            color: var(--text-color);
        }

        .stat-count {
            font-weight: bold;
            color: var(--accent-color);
            display: block;
            font-size: 18px;
        }

        .blur { filter: blur(6px); opacity: 0.8; }
        .pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>五年啦！</h1>

    <div id="gacha-machine">
        <div id="display-window">❤️</div>
        <div id="message-display">五週年要做什麼呢...</div>
        <button id="lever" onclick="handleGacha()">PUSH</button>
    </div>

    <div id="stats-panel">
        <h3>五週年戰績紀錄</h3>
        <div class="stats-grid" id="stats-grid">
            </div>
    </div>

    <script>
        const data = [
            { id: 'tomato', emoji: '🍅', txt: '聽說容容更愛我?' },
            { id: 'coffee', emoji: '☕', txt: '很久沒去咖啡探險了欸?' },
            { id: 'clothes', emoji: '🧺', txt: '今天我就乖乖待在籃子裡，請不要洗我。' },
            { id: 'pot', emoji: '🍳', txt: '五週年還要煮？燒焦給妳看！' },
            { id: 'cat', emoji: '🐈‍⬛', txt: '\\肉泥/\\肉泥/\\肉泥/\\肉泥/\\肉泥/' },
            { id: 'sleep', emoji: '💤', txt: '。' },
            { id: 'wine', emoji: '🥃', txt: '今天要喝威士忌還是威士忌呢?' },
            { id: 'heart', emoji: '💖', txt: '五週年快樂！' }
        ];

        // 初始化統計數據
        let stats = {};
        data.forEach(item => stats[item.id] = 0);

        let spinning = false;
        let spinTimer;
        const lever = document.getElementById('lever');
        const display = document.getElementById('display-window');
        const msg = document.getElementById('message-display');

        // 初始化統計介面
        function initStats() {
            const grid = document.getElementById('stats-grid');
            grid.innerHTML = data.map(item => `
                <div class="stat-item">
                    <span>${item.emoji}</span>
                    <span class="stat-count" id="count-${item.id}">0</span>
                </div>
            `).join('');
        }

        function handleGacha() {
            if (spinning) stopSpin();
            else startSpin();
        }

        function startSpin() {
            spinning = true;
            lever.innerText = 'STOP!';
            display.classList.add('blur');
            spinTimer = setInterval(() => {
                const random = data[Math.floor(Math.random() * data.length)];
                display.innerText = random.emoji;
            }, 60); 
        }

        function stopSpin() {
            spinning = false;
            lever.innerText = 'PUSH';
            clearInterval(spinTimer);
            display.classList.remove('blur');
            display.classList.add('pop');
            
            const result = data[Math.floor(Math.random() * data.length)];
            display.innerText = result.emoji;
            msg.innerText = result.txt;

            // 更新統計
            stats[result.id]++;
            document.getElementById(`count-${result.id}`).innerText = stats[result.id];

            setTimeout(() => display.classList.remove('pop'), 200);
        }

        initStats();
    </script>
</body>
</html>
